<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INDYCAR Advanced Live Timing</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap');
    :root {
      --bg-primary:#080a0f; --bg-secondary:#0d1117; --bg-card:#111520; --bg-header:#0a0d14;
      --accent-red:#ff0033; --accent-cyan:#00e5ff; --accent-purple:#c084fc; --accent-gold:#c5a059;
      --text-primary:#e2e8f0; --text-muted:#64748b; --text-dim:#475569;
      --border:#1e2a3a; --border-bright:#2d3f55; --green:#00e5c0; --yellow:#f59e0b; --white:#ffffff;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg-primary);color:var(--text-primary);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:auto;}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:9999;}
    .container{max-width:1400px;margin:0 auto;padding:16px 20px;}
    header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:14px;position:relative;}
    header::after{content:'';position:absolute;bottom:-1px;left:0;width:200px;height:2px;background:linear-gradient(90deg,var(--accent-red),transparent);}
    .brand{display:flex;flex-direction:column;gap:4px;}
    h1{font-family:'Orbitron',monospace;color:var(--white);font-size:22px;font-weight:900;letter-spacing:3px;line-height:1;}
    h1 .series{color:var(--accent-red);}
    h1 .label{color:var(--text-muted);font-weight:400;font-size:13px;letter-spacing:2px;}
    .session-info{font-family:'Share Tech Mono',monospace;color:var(--accent-cyan);font-size:11px;letter-spacing:2px;margin-top:2px;opacity:.8;}
    .mode-selector{display:flex;gap:8px;align-items:center;}
    .nav-btn{background:transparent;border:1px solid var(--border-bright);color:var(--text-muted);padding:7px 14px;font-family:'Orbitron',monospace;font-size:9px;font-weight:700;border-radius:3px;cursor:pointer;letter-spacing:1.5px;transition:all .2s;}
    .nav-btn:hover{border-color:var(--accent-cyan);color:var(--accent-cyan);}
    .nav-btn.active{background:var(--accent-red);color:white;border-color:var(--accent-red);box-shadow:0 0 12px rgba(255,0,51,.4);}
    .player-controls{display:flex;align-items:center;background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--accent-red);padding:10px 18px;border-radius:4px;margin-bottom:12px;gap:16px;}
    .control-btn{background:var(--accent-red);color:white;border:none;padding:7px 14px;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;border-radius:3px;cursor:pointer;min-width:90px;letter-spacing:1px;transition:all .2s;}
    .control-btn:hover{background:#cc0029;}
    .timeline-container{display:flex;align-items:center;flex-grow:1;gap:12px;}
    .time-digital{font-family:'Share Tech Mono',monospace;color:var(--accent-cyan);font-size:14px;font-weight:bold;min-width:40px;}
    #replay-timeline{flex-grow:1;accent-color:var(--accent-red);cursor:pointer;height:4px;border-radius:2px;}
    .speed-container{display:flex;align-items:center;gap:8px;color:var(--text-muted);font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;}
    .speed-dropdown{background:var(--bg-secondary);color:var(--text-primary);border:1px solid var(--border-bright);padding:5px 8px;border-radius:3px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:11px;}
    .stats-bar{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
    .stat-chip{background:var(--bg-card);border:1px solid var(--border);padding:6px 14px;border-radius:3px;display:flex;flex-direction:column;gap:1px;}
    .stat-chip .label{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1.5px;color:var(--text-muted);}
    .stat-chip .value{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--accent-purple);font-weight:bold;}
    .stat-chip .value.cyan{color:var(--accent-cyan);} .stat-chip .value.gold{color:var(--accent-gold);}
    .status-badge{display:inline-flex;align-items:center;gap:6px;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;padding:4px 10px;border-radius:3px;margin-bottom:10px;}
    .status-badge.loading{background:rgba(245,158,11,.1);color:var(--yellow);border:1px solid rgba(245,158,11,.3);}
    .status-badge.ok{background:rgba(0,229,255,.1);color:var(--accent-cyan);border:1px solid rgba(0,229,255,.3);}
    .status-badge.error{background:rgba(255,0,51,.1);color:var(--accent-red);border:1px solid rgba(255,0,51,.3);}
    .table-wrapper{border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--bg-card);}
    .timing-table{width:100%;border-collapse:collapse;min-width:900px;}
    .timing-table thead{background:var(--bg-header);}
    .timing-table th{padding:9px 12px;font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--text-muted);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
    .timing-table th.sc{color:var(--text-dim);}
    .timing-table tbody tr{border-bottom:1px solid rgba(30,42,58,.6);transition:background .15s;}
    .timing-table tbody tr:hover{background:rgba(255,255,255,.02);}
    .timing-table tbody tr:last-child{border-bottom:none;}
    .timing-table td{padding:9px 12px;font-size:14px;font-weight:600;color:var(--white);white-space:nowrap;}
    .pos-cell{font-family:'Orbitron',monospace;font-size:12px;font-weight:900;color:var(--text-muted);width:36px;}
    .pos-cell.top3{color:var(--accent-gold);}
    .num-cell{font-family:'Share Tech Mono',monospace;font-size:15px;font-weight:bold;color:var(--accent-red);width:42px;}
    .driver-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;border-left:3px solid var(--accent-cyan);padding-left:6px;}
    .time-best{font-family:'Share Tech Mono',monospace;font-size:13px;}
    .time-best.purple{color:var(--accent-purple);} .time-best.cyan{color:var(--accent-cyan);} .time-best.dim{color:var(--text-dim);}
    .gap-cell{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text-primary);}
    .gap-cell.leader{color:var(--accent-gold);font-family:'Orbitron',monospace;font-size:10px;letter-spacing:1px;}
    .sector-time{font-family:'Share Tech Mono',monospace;font-size:12px;}
    .sector-time.purple{color:var(--accent-purple);} .sector-time.cyan{color:var(--accent-cyan);} .sector-time.dim{color:var(--text-dim);}
    .sector-progress-wrapper{display:flex;align-items:center;gap:5px;}
    .sector-block{display:flex;gap:2px;background:rgba(0,0,0,.3);border-radius:2px;padding:3px;border:1px solid rgba(255,255,255,.04);}
    .led{width:10px;height:10px;border-radius:1px;transition:background-color .15s,box-shadow .15s;}
    .led-gray{background:#1a2233;} .led-purple{background:var(--accent-purple);box-shadow:0 0 4px rgba(192,132,252,.6);}
    .led-green{background:var(--green);box-shadow:0 0 4px rgba(0,229,192,.6);} .led-yellow{background:var(--yellow);box-shadow:0 0 4px rgba(245,158,11,.5);}
    .schedule-table{width:100%;border-collapse:collapse;}
    .schedule-table th{padding:9px 14px;font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--text-muted);text-align:left;border-bottom:1px solid var(--border);background:var(--bg-header);}
    .schedule-table td{padding:10px 14px;font-size:14px;color:var(--text-primary);border-bottom:1px solid rgba(30,42,58,.6);}
    .schedule-table tr.clickable:hover td{background:rgba(0,229,255,.03);cursor:pointer;}
    .round-num{font-family:'Orbitron',monospace;color:var(--accent-gold);font-size:12px;font-weight:900;}
    .event-name{font-weight:700;color:var(--white);}
    .event-date{font-family:'Share Tech Mono',monospace;color:var(--accent-cyan);font-size:12px;}
    .ev-status{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;padding:3px 8px;border-radius:2px;}
    .s-closed{background:rgba(0,229,192,.1);color:var(--green);border:1px solid rgba(0,229,192,.3);}
    .s-scheduled{background:rgba(245,158,11,.1);color:var(--yellow);border:1px solid rgba(245,158,11,.3);}
    .tabs{display:flex;gap:4px;margin-bottom:12px;}
    .tab-btn{background:var(--bg-card);border:1px solid var(--border);color:var(--text-muted);padding:7px 16px;font-family:'Orbitron',monospace;font-size:9px;font-weight:700;border-radius:3px;cursor:pointer;letter-spacing:1px;transition:all .2s;}
    .tab-btn:hover{color:var(--accent-cyan);border-color:var(--accent-cyan);}
    .tab-btn.active{background:rgba(0,229,255,.1);color:var(--accent-cyan);border-color:var(--accent-cyan);}
    /* Grid badge */
    .grid-badge{font-family:'Orbitron',monospace;font-size:9px;color:var(--text-dim);background:rgba(255,255,255,.04);padding:2px 6px;border-radius:2px;}
    .status-dnf{color:var(--accent-red);font-family:'Orbitron',monospace;font-size:10px;}
    footer{margin-top:16px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    footer span{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:1px;}
    #loading-overlay{position:fixed;inset:0;background:var(--bg-primary);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9998;gap:16px;}
    .loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent-red);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:2px;color:var(--text-muted);}
  </style>
</head>
<body>
<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">CARGANDO INDYCAR 2026...</div>
</div>
<div class="container">
  <header>
    <div class="brand">
      <h1><span class="series">INDYCAR</span> <span class="label">ADVANCED LIVE TIMING</span></h1>
      <div id="session-info" class="session-info">▸ LOADING...</div>
    </div>
    <div style="display:flex;align-items:center;gap:20px;">
      <div class="mode-selector">
        <button id="btn-sim" class="nav-btn active">SIMULATION</button>
        <button id="btn-cal" class="nav-btn">SCHEDULE</button>
      </div>
    </div>
  </header>

  <!-- SIMULATION -->
  <div id="view-sim">
    <div class="player-controls">
      <button id="btn-play-pause" class="control-btn">⏸ PAUSE</button>
      <div class="timeline-container">
        <span id="time-current" class="time-digital">00:00</span>
        <input type="range" id="replay-timeline" min="0" max="600" value="0" step="1">
        <span class="time-digital">10:00</span>
      </div>
      <div class="speed-container">
        <span>VEL:</span>
        <select id="speed-select" class="speed-dropdown">
          <option value="1000">1x</option><option value="500">2x</option>
          <option value="200">5x</option><option value="50">20x</option>
        </select>
      </div>
    </div>
    <div class="stats-bar">
      <div class="stat-chip"><span class="label">BEST LAP</span><span class="value" id="stat-best">--:--</span></div>
      <div class="stat-chip"><span class="label">BEST S1</span><span class="value cyan" id="stat-s1">--</span></div>
      <div class="stat-chip"><span class="label">BEST S2</span><span class="value cyan" id="stat-s2">--</span></div>
      <div class="stat-chip"><span class="label">BEST S3</span><span class="value cyan" id="stat-s3">--</span></div>
      <div class="stat-chip" style="margin-left:auto;"><span class="label">ON TRACK</span><span class="value gold" id="stat-ontrack">0/12</span></div>
    </div>
    <div class="table-wrapper">
      <table class="timing-table">
        <thead><tr>
          <th>POS</th><th>#</th><th>DRIVER</th><th>BEST LAP</th>
          <th>GAP LEADER</th><th>INTERVAL</th><th>LAST LAP</th>
          <th class="sc">S1</th><th class="sc">S2</th><th class="sc">S3</th><th>PROGRESS</th>
        </tr></thead>
        <tbody id="timing-body"></tbody>
      </table>
    </div>
  </div>

  <!-- SCHEDULE + RESULTS -->
  <div id="view-cal" style="display:none;">
    <div id="cal-status" class="status-badge loading">⟳ LOADING...</div>

    <div id="panel-events">
      <div class="table-wrapper">
        <table class="schedule-table">
          <thead><tr><th>RND</th><th>EVENT</th><th>CIRCUIT</th><th>DATE</th><th>STATUS</th></tr></thead>
          <tbody id="schedule-body"></tbody>
        </table>
      </div>
    </div>

    <div id="panel-results" style="display:none;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
        <button id="btn-back" class="nav-btn">← BACK</button>
        <span id="results-title" style="font-family:'Orbitron',monospace;font-size:13px;color:var(--accent-gold);letter-spacing:1px;"></span>
      </div>
      <div class="tabs" id="results-tabs"></div>
      <div id="results-status" class="status-badge loading"></div>
      <div class="table-wrapper">
        <table class="timing-table" id="results-table">
          <thead id="results-thead"></thead>
          <tbody id="results-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <footer>
    <span>INDYCAR TIMING v2.0 &nbsp;|&nbsp; DATA: SPORTRADAR</span>
    <span id="footer-clock">--:--:--</span>
  </footer>
</div>

<script>
const WORKER = 'https://indycar-proxy.viralesmundomotor.workers.dev';
const SEASON = 'sr:stage:1329747';

// ── SIMULATION ──────────────────────────────────────────────
const pilotosBase = [
  {num:10,nombre:"Álex Palou"},{num:5,nombre:"Pato O'Ward"},{num:26,nombre:"Colton Herta"},
  {num:12,nombre:"Will Power"},{num:9,nombre:"Scott Dixon"},{num:2,nombre:"Josef Newgarden"},
  {num:3,nombre:"Scott McLaughlin"},{num:28,nombre:"Marcus Ericsson"},{num:7,nombre:"Alexander Rossi"},
  {num:77,nombre:"Romain Grosjean"},{num:6,nombre:"Callum Ilott"},{num:45,nombre:"C. Lundgaard"},
].map(p=>({...p,mejorVuelta:999,ultimaVuelta:0,etapa:0,leds:Array(9).fill("led-gray"),
  bS1:999,bS2:999,bS3:999,enPista:false,vueltasDadas:0,tiempoVueltaCorriente:0,sectoresVueltaActual:[0,0,0]}));

let pilotos=JSON.parse(JSON.stringify(pilotosBase));
let rS1=999,rS2=999,rS3=999,rVuelta=999,rMicro=Array(9).fill(999),persMicro={};
function resetP(){pilotos.forEach(p=>persMicro[p.num]=Array(9).fill(999));}
resetP();
const mObj=[7.320,7.310,7.330,7.420,7.410,7.430,7.820,7.810,7.830];
let corriendo=true,timer,velMs=1000,seg=0;

function fDig(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
function fT(s,d=false){
  if(!s||s===999||s===0)return d?"":"--:--";
  if(d)return`+${s.toFixed(3)}`;
  const m=Math.floor(s/60),sc=(s%60).toFixed(3);
  return m>0?`${m}:${sc.padStart(6,'0')}`:sc;
}

// Calcular gap entre dos tiempos tipo "1:59:08.5542"
function calcGap(timeLeader, timeDriver) {
  try {
    if(!timeLeader || !timeDriver) return '-';
    const toSec = t => {
      const parts = t.split(':');
      if(parts.length===3) return +parts[0]*3600 + +parts[1]*60 + +parts[2];
      if(parts.length===2) return +parts[0]*60 + +parts[1];
      return +parts[0];
    };
    const secL = toSec(timeLeader);
    const secD = toSec(timeDriver);
    if(isNaN(secL)||isNaN(secD)||!secL||!secD) return '-';
    const diff = secD - secL;
    if(diff<=0) return 'LEADER';
    return `+${diff.toFixed(3)}s`;
  } catch(e){ return '-'; }
}

function renderSim(){
  const tb=document.getElementById('timing-body');
  tb.innerHTML="";
  let ord=[...pilotos].sort((a,b)=>{
    const tA=a.mejorVuelta<999,tB=b.mejorVuelta<999;
    if(tA&&!tB)return -1;if(!tA&&tB)return 1;
    if(!tA&&!tB)return a.num-b.num;return a.mejorVuelta-b.mejorVuelta;
  });
  const lider=ord.find(p=>p.mejorVuelta<999);
  const tL=lider?lider.mejorVuelta:null;
  const enP=pilotos.filter(p=>p.enPista).length;
  document.getElementById('stat-best').textContent=rVuelta<999?fT(rVuelta):'--:--';
  document.getElementById('stat-s1').textContent=rS1<999?rS1.toFixed(3):'--';
  document.getElementById('stat-s2').textContent=rS2<999?rS2.toFixed(3):'--';
  document.getElementById('stat-s3').textContent=rS3<999?rS3.toFixed(3):'--';
  document.getElementById('stat-ontrack').textContent=`${enP}/12`;
  ord.forEach((p,i)=>{
    const pos=i+1,tT=p.mejorVuelta<999;
    let gap="-",intv="-";
    if(tL&&tT){
      if(p.mejorVuelta===tL){gap="LEADER";}
      else{
        gap=fT(p.mejorVuelta-tL,true);
        const ant=ord.slice(0,i).reverse().find(a=>a.mejorVuelta<999);
        intv=ant?fT(p.mejorVuelta-ant.mejorVuelta,true):"-";
      }
    }
    const cS1=p.bS1<999?(p.bS1<=rS1?"sector-time purple":"sector-time cyan"):"sector-time dim";
    const cS2=p.bS2<999?(p.bS2<=rS2?"sector-time purple":"sector-time cyan"):"sector-time dim";
    const cS3=p.bS3<999?(p.bS3<=rS3?"sector-time purple":"sector-time cyan"):"sector-time dim";
    const cV=tT?(p.mejorVuelta<=rVuelta?"time-best purple":"time-best cyan"):"time-best dim";
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td class="${pos<=3?'pos-cell top3':'pos-cell'}">${pos}</td>
      <td class="num-cell">${p.num}</td>
      <td><span class="driver-name" style="${p.enPista?'color:var(--white)':'color:var(--text-muted);font-weight:400'}">${p.nombre}${p.enPista?' ⏱':''}</span></td>
      <td><span class="${cV}">${tT?fT(p.mejorVuelta):'NO TIME'}</span></td>
      <td><span class="gap-cell ${gap==='LEADER'?'leader':''}">${gap}</span></td>
      <td><span class="gap-cell">${intv}</span></td>
      <td><span class="time-best ${p.ultimaVuelta>0?'cyan':'dim'}">${p.ultimaVuelta>0?fT(p.ultimaVuelta):'--:--'}</span></td>
      <td><span class="${cS1}">${p.bS1<999?p.bS1.toFixed(3):'-'}</span></td>
      <td><span class="${cS2}">${p.bS2<999?p.bS2.toFixed(3):'-'}</span></td>
      <td><span class="${cS3}">${p.bS3<999?p.bS3.toFixed(3):'-'}</span></td>
      <td><div class="sector-progress-wrapper">
        <div class="sector-block"><div class="led ${p.leds[0]}"></div><div class="led ${p.leds[1]}"></div><div class="led ${p.leds[2]}"></div></div>
        <div class="sector-block"><div class="led ${p.leds[3]}"></div><div class="led ${p.leds[4]}"></div><div class="led ${p.leds[5]}"></div></div>
        <div class="sector-block"><div class="led ${p.leds[6]}"></div><div class="led ${p.leds[7]}"></div><div class="led ${p.leds[8]}"></div></div>
      </div></td>`;
    tb.appendChild(tr);
  });
}

function tick(){
  if(!corriendo)return;
  seg++;
  document.getElementById('replay-timeline').value=seg;
  document.getElementById('time-current').textContent=fDig(seg);
  if(seg>=600){clearInterval(timer);corriendo=false;document.getElementById('btn-play-pause').textContent="▶ PLAY";return;}
  const enP=pilotos.filter(p=>p.enPista);
  if(enP.length<4&&Math.random()<.22){
    const s=pilotos.find(p=>!p.enPista&&p.vueltasDadas<4);
    if(s){s.enPista=true;s.etapa=0;s.vueltasDadas++;s.tiempoVueltaCorriente=0;s.sectoresVueltaActual=[0,0,0];s.leds=Array(9).fill("led-gray");}
  }
  pilotos.filter(p=>p.enPista).forEach(p=>{
    p.etapa++;const mi=p.etapa-1,es=p.vueltasDadas===1;
    const v=(Math.random()*.14)-.06,tm=+(mObj[mi]+(es?1.5:0)+v).toFixed(3);
    p.tiempoVueltaCorriente+=tm;
    if(mi<=2)p.sectoresVueltaActual[0]+=tm;else if(mi<=5)p.sectoresVueltaActual[1]+=tm;else p.sectoresVueltaActual[2]+=tm;
    if(!es){
      if(tm<rMicro[mi]){rMicro[mi]=tm;p.leds[mi]="led-purple";}
      else if(tm<persMicro[p.num][mi]){persMicro[p.num][mi]=tm;p.leds[mi]="led-green";}
      else p.leds[mi]="led-yellow";
    }else p.leds[mi]="led-yellow";
    if(!es){
      if(p.etapa===3){const s1=p.sectoresVueltaActual[0];if(s1<p.bS1)p.bS1=s1;if(s1<rS1)rS1=s1;}
      if(p.etapa===6){const s2=p.sectoresVueltaActual[1];if(s2<p.bS2)p.bS2=s2;if(s2<rS2)rS2=s2;}
    }
    if(p.etapa===9){
      const tot=+p.tiempoVueltaCorriente.toFixed(3);p.ultimaVuelta=tot;
      if(!es){
        const s3=p.sectoresVueltaActual[2];if(s3<p.bS3)p.bS3=s3;if(s3<rS3)rS3=s3;
        if(tot<p.mejorVuelta)p.mejorVuelta=tot;if(tot<rVuelta)rVuelta=tot;
      }
      p.etapa=0;p.tiempoVueltaCorriente=0;p.sectoresVueltaActual=[0,0,0];p.vueltasDadas++;
      if(p.vueltasDadas>=4){p.enPista=false;p.leds=Array(9).fill("led-gray");}
    }
  });
  renderSim();
}
function arrancar(){clearInterval(timer);timer=setInterval(tick,velMs);}

document.getElementById('btn-play-pause').addEventListener('click',function(){
  corriendo=!corriendo;this.textContent=corriendo?"⏸ PAUSE":"▶ PLAY";
  if(corriendo)arrancar();else clearInterval(timer);
});
document.getElementById('speed-select').addEventListener('change',function(){velMs=parseInt(this.value);if(corriendo)arrancar();});
document.getElementById('replay-timeline').addEventListener('input',function(){
  seg=parseInt(this.value);document.getElementById('time-current').textContent=fDig(seg);
  pilotos=JSON.parse(JSON.stringify(pilotosBase));resetP();
  rS1=999;rS2=999;rS3=999;rVuelta=999;rMicro=Array(9).fill(999);
  const fp=seg/600;
  if(seg>20){
    pilotos.forEach((p,i)=>{
      p.vueltasDadas=Math.min(Math.floor(seg/120)+1,4);
      if(p.vueltasDadas>1){
        p.mejorVuelta=+(66.800+i*.04-fp*.3).toFixed(3);p.bS1=+(21.310+i*.01-fp*.08).toFixed(3);
        p.bS2=+(22.110+i*.01-fp*.08).toFixed(3);p.bS3=+(23.380+i*.01-fp*.08).toFixed(3);
        p.ultimaVuelta=+(p.mejorVuelta+Math.random()*.2).toFixed(3);
        p.leds=["led-purple","led-green","led-yellow","led-green","led-purple","led-yellow","led-green","led-green","led-yellow"];
      }
    });
    rS1=Math.min(...pilotos.map(p=>p.bS1).filter(v=>v<999));
    rS2=Math.min(...pilotos.map(p=>p.bS2).filter(v=>v<999));
    rS3=Math.min(...pilotos.map(p=>p.bS3).filter(v=>v<999));
    rVuelta=Math.min(...pilotos.map(p=>p.mejorVuelta).filter(v=>v<999));
  }
  renderSim();
});

// ── API ──────────────────────────────────────────────────────
async function api(ep){
  const r=await fetch(`${WORKER}?endpoint=${encodeURIComponent(ep)}`);
  return r.json();
}

// ── SCHEDULE ───────────────────────────────────────────────
async function loadCalendar(){
  const st=document.getElementById('cal-status');
  st.className='status-badge loading';st.textContent='⟳ CARGANDO SCHEDULE 2026...';
  try{
    const data=await api(`sport_events/${SEASON}/summary`);
    const events=data.stage?.stages||[];
    const tbody=document.getElementById('schedule-body');
    tbody.innerHTML='';
    events.forEach((ev,i)=>{
      if(!ev.description)return;
      const d=ev.scheduled?new Date(ev.scheduled).toLocaleDateString('es-DO',{day:'2-digit',month:'short',year:'numeric'}):'--';
      const closed=ev.status==='Closed'||ev.status==='closed';
      const tr=document.createElement('tr');
      tr.className=closed?'clickable':'';
      tr.innerHTML=`
        <td class="round-num">${String(i+1).padStart(2,'0')}</td>
        <td class="event-name">${ev.description}</td>
        <td style="color:var(--text-muted);font-size:13px;">${ev.venue?.name||'-'}</td>
        <td class="event-date">${d}</td>
        <td><span class="ev-status ${closed?'s-closed':'s-scheduled'}">${closed?'▶ VIEW RESULTS':'UPCOMING'}</span></td>`;
      if(closed) tr.addEventListener('click',()=>loadEventResults(ev));
      tbody.appendChild(tr);
    });
    st.className='status-badge ok';
    st.textContent=`✓ SEASON 2026 — ${events.length} EVENTS`;
  }catch(e){
    st.className='status-badge error';st.textContent='✗ ERROR LOADING';
  }
}

// ── RESULTS ───────────────────────────────────────────────
let eventStages={};

async function loadEventResults(ev){
  document.getElementById('panel-events').style.display='none';
  document.getElementById('panel-results').style.display='block';
  document.getElementById('results-title').textContent=ev.description.toUpperCase();
  document.getElementById('results-tabs').innerHTML='';
  document.getElementById('results-body').innerHTML='';
  const rs=document.getElementById('results-status');
  rs.className='status-badge loading';rs.textContent='⟳ LOADING SESSIONS...';

  try{
    const data=await api(`sport_events/${ev.id}/summary`);
    const stages=data.stage?.stages||[];
    eventStages={};

    stages.forEach(s=>{
      const t=(s.type||'').toLowerCase();
      const d=(s.description||'').toLowerCase();
      if(t==='race'||d==='race'){
        eventStages['RACE']=s;
      } else if(t==='qualifying'||d.includes('qualif')||d.includes('fast')){
        const n=Object.keys(eventStages).filter(k=>k.startsWith('CLASIF')).length;
        eventStages[n===0?'QUALIFYING':`QUALIFYING ${n+1}`]=s;
      } else if(t==='practice'||d.includes('practice')){
        const n=Object.keys(eventStages).filter(k=>k.startsWith('PRÁCT')).length;
        eventStages[`PRACTICE ${n+1}`]=s;
      }
    });

    if(Object.keys(eventStages).length===0) eventStages['RESULT']=ev;

    const tabsEl=document.getElementById('results-tabs');
    // Orden preferido
    const orden=['RACE','QUALIFYING','QUALIFYING 2','PRACTICE 1','PRACTICE 2','PRACTICE 3','PRACTICE 4','PRACTICE 5','RESULT'];
    const keys=orden.filter(k=>eventStages[k]).concat(Object.keys(eventStages).filter(k=>!orden.includes(k)));

    keys.forEach((label,i)=>{
      const btn=document.createElement('button');
      btn.className=`tab-btn${i===0?' active':''}`;
      btn.textContent=label;
      btn.addEventListener('click',function(){
        document.querySelectorAll('#results-tabs .tab-btn').forEach(b=>b.classList.remove('active'));
        this.classList.add('active');
        loadSessionResults(eventStages[label], label);
      });
      tabsEl.appendChild(btn);
    });

    if(keys.length>0) await loadSessionResults(eventStages[keys[0]], keys[0]);

  }catch(e){
    rs.className='status-badge error';rs.textContent='✗ ERROR LOADING SESSIONS';
  }
}

async function loadSessionResults(stage, label){
  const rs=document.getElementById('results-status');
  rs.className='status-badge loading';rs.textContent=`⟳ CARGANDO ${label}...`;
  const tbody=document.getElementById('results-body');
  const thead=document.getElementById('results-thead');
  tbody.innerHTML='';

  const isRace = label && label.includes('RACE');
  const isQualy = label && label.includes('CLASIF');

  try{
    const data=await api(`sport_events/${stage.id}/summary`);
    const competitors=data.stage?.competitors||data.competitors||[];

    if(competitors.length===0||!competitors[0]?.result){
      tbody.innerHTML=`<tr><td colspan="8" style="text-align:center;color:var(--text-dim);padding:30px;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:1px;">SIN RESULTS — SESIÓN PENDIENTE O SIN DATOS</td></tr>`;
      rs.className='status-badge error';rs.textContent='⚠ SIN RESULTS DISPONIBLES';
      return;
    }

    // Ordenar por posición
    const sorted=[...competitors].sort((a,b)=>(a.result?.position||99)-(b.result?.position||99));
    const leaderTime = sorted[0]?.result?.time || null;
    const fastestLap = sorted.reduce((best,c)=>{
      const t=c.result?.fastest_lap_time;
      if(!t)return best;
      return(!best||t<best)?t:best;
    }, null);

    // Headers según tipo de sesión
    if(isRace){
      thead.innerHTML=`<tr>
        <th>POS</th><th>#</th><th>DRIVER</th><th>COUNTRY</th>
        <th>TIEMPO RACE</th><th>GAP LEADER</th>
        <th>BEST LAP</th><th>LAPS</th><th>GRID</th>
      </tr>`;
    } else if(isQualy){
      thead.innerHTML=`<tr>
        <th>POS</th><th>#</th><th>DRIVER</th><th>COUNTRY</th>
        <th>BEST LAP</th><th>GAP LEADER</th><th>SPEED</th>
      </tr>`;
    } else {
      thead.innerHTML=`<tr>
        <th>POS</th><th>#</th><th>DRIVER</th><th>COUNTRY</th>
        <th>BEST LAP</th><th>GAP</th><th>LAPS</th>
      </tr>`;
    }

    sorted.forEach((c,i)=>{
      const r=c.result||{};
      const pos=r.position||i+1;
      const num=r.car_number||'-';
      const nombre=c.name||'?';
      const pais=c.nationality||c.country_code||'-';
      const finished=r.status==='Finished'||!r.status;
      const posClass=pos<=3?'pos-cell top3':'pos-cell';
      const isFastestLap = fastestLap && r.fastest_lap_time===fastestLap;

      const fastLapHtml = r.fastest_lap_time
        ? `<span class="time-best ${isFastestLap?'purple':'cyan'}">${r.fastest_lap_time}${isFastestLap?' ⚡':''}</span>`
        : `<span class="time-best dim">--:--</span>`;

      const leaderLaps = sorted[0]?.result?.laps || 0;
      const driverLaps = r.laps || 0;
      const lapDiff = leaderLaps - driverLaps;
      let gap="-";
      if(pos===1) gap='LEADER';
      else if(!finished) gap=`<span class="status-dnf">${r.status||'DNF'}</span>`;
      else if(lapDiff>0) gap=`+${lapDiff} LAP${lapDiff>1?"S":""}`;
      else if(r.time&&leaderTime) gap=calcGap(leaderTime,r.time);

      const tr=document.createElement('tr');

      if(isRace){
        tr.innerHTML=`
          <td class="${posClass}">${pos}</td>
          <td class="num-cell">${num}</td>
          <td><span class="driver-name" style="color:var(--white)">${nombre}</span></td>
          <td style="color:var(--text-muted);font-size:12px;font-family:'Share Tech Mono',monospace;">${pais}</td>
          <td><span class="time-best ${pos===1?'purple':'cyan'}">${r.time||'--:--'}</span></td>
          <td><span class="gap-cell ${pos===1?'leader':''}">${gap}</span></td>
          <td>${fastLapHtml}</td>
          <td style="color:var(--text-muted);font-size:12px;font-family:'Share Tech Mono',monospace;">${r.laps||'-'}</td>
          <td><span class="grid-badge">${r.grid?'P'+r.grid:'-'}</span></td>`;
      } else if(isQualy){
        const speed=r.speed?`${parseFloat(r.speed).toFixed(3)} mph`:'--';
        tr.innerHTML=`
          <td class="${posClass}">${pos}</td>
          <td class="num-cell">${num}</td>
          <td><span class="driver-name" style="color:var(--white)">${nombre}</span></td>
          <td style="color:var(--text-muted);font-size:12px;font-family:'Share Tech Mono',monospace;">${pais}</td>
          <td>${fastLapHtml}</td>
          <td><span class="gap-cell ${pos===1?'leader':''}">${gap}</span></td>
          <td style="color:var(--accent-cyan);font-family:'Share Tech Mono',monospace;font-size:12px;">${speed}</td>`;
      } else {
        tr.innerHTML=`
          <td class="${posClass}">${pos}</td>
          <td class="num-cell">${num}</td>
          <td><span class="driver-name" style="color:var(--white)">${nombre}</span></td>
          <td style="color:var(--text-muted);font-size:12px;font-family:'Share Tech Mono',monospace;">${pais}</td>
          <td>${fastLapHtml}</td>
          <td><span class="gap-cell ${pos===1?'leader':''}">${gap}</span></td>
          <td style="color:var(--text-muted);font-size:12px;font-family:'Share Tech Mono',monospace;">${r.laps||'-'}</td>`;
      }
      tbody.appendChild(tr);
    });

    rs.className='status-badge ok';
    rs.textContent=`✓ ${label} — ${sorted.length} DRIVERS — REAL DATA: SPORTRADAR${fastestLap?' — FASTEST LAP: '+fastestLap:''}`;
  }catch(e){
    rs.className='status-badge error';rs.textContent='✗ ERROR LOADING';
  }
}
